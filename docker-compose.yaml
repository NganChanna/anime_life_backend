services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anime_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anime_pass}
      POSTGRES_DB: ${POSTGRES_DB:-anime_live}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anime_user} -d ${POSTGRES_DB:-anime_live}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-anime_user}:${POSTGRES_PASSWORD:-anime_pass}@db:5432/${POSTGRES_DB:-anime_live}

volumes:
  pg_data:
